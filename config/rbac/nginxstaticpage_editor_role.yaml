# This rule is not used by the project nginx-static-page itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the static.cafeco.io.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: nginx-static-page
    app.kubernetes.io/managed-by: kustomize
  name: nginxstaticpage-editor-role
rules:
- apiGroups:
  - static.cafeco.io
  resources:
  - nginxstaticpages
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - static.cafeco.io
  resources:
  - nginxstaticpages/status
  verbs:
  - get
