# This rule is not used by the project nginx-static-page itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over static.cafeco.io.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: nginx-static-page
    app.kubernetes.io/managed-by: kustomize
  name: nginxstaticpage-admin-role
rules:
- apiGroups:
  - static.cafeco.io
  resources:
  - nginxstaticpages
  verbs:
  - '*'
- apiGroups:
  - static.cafeco.io
  resources:
  - nginxstaticpages/status
  verbs:
  - get
