---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - configmaps
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - apps
  resources:
  - deployments
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - static.cafeco.io
  resources:
  - nginxstaticpages
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - static.cafeco.io
  resources:
  - nginxstaticpages/finalizers
  verbs:
  - update
- apiGroups:
  - static.cafeco.io
  resources:
  - nginxstaticpages/status
  verbs:
  - get
  - patch
  - update
